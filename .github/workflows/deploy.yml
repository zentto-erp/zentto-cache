name: Deploy Zentto Cache

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

concurrency:
  group: deploy-zentto-cache
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/zentto-erp/zentto-cache:latest

      - name: Ensure Cloudflare DNS
        env:
          CF_API_EMAIL: ${{ secrets.CF_API_EMAIL }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          RECORD_NAME="cache.zentto.net"
          RECORD_IP="178.104.56.185"
          RECORD_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=A&name=${RECORD_NAME}" \
            -H "X-Auth-Email: ${CF_API_EMAIL}" \
            -H "X-Auth-Key: ${CF_API_KEY}" \
            -H "Content-Type: application/json" | jq -r '.result[0].id // empty')

          if [ -n "$RECORD_ID" ]; then
            curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${RECORD_ID}" \
              -H "X-Auth-Email: ${CF_API_EMAIL}" \
              -H "X-Auth-Key: ${CF_API_KEY}" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"${RECORD_NAME}\",\"content\":\"${RECORD_IP}\",\"ttl\":1,\"proxied\":true}"
          else
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
              -H "X-Auth-Email: ${CF_API_EMAIL}" \
              -H "X-Auth-Key: ${CF_API_KEY}" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"${RECORD_NAME}\",\"content\":\"${RECORD_IP}\",\"ttl\":1,\"proxied\":true}"
          fi

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN
          script: |
            set -e
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            mkdir -p /opt/zentto-cache
            cat > /opt/zentto-cache/docker-compose.yml <<'EOF'
            services:
              redis:
                image: redis:7-alpine
                container_name: zentto-cache-redis
                restart: unless-stopped
                command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
                volumes:
                  - redis_data:/data

              api:
                image: ghcr.io/zentto-erp/zentto-cache:latest
                container_name: zentto-cache
                restart: unless-stopped
                depends_on:
                  - redis
                ports:
                  - "4101:4100"
                environment:
                  PORT: 4100
                  REDIS_URL: redis://redis:6379
                  TTL_DAYS: 90
                  CORS_ORIGINS: https://app.zentto.net,https://shell.zentto.net,http://localhost:3016
                  LOG_LEVEL: info
                  MAX_LAYOUT_BYTES: 51200
            volumes:
              redis_data:
            EOF

            docker compose -f /opt/zentto-cache/docker-compose.yml pull
            docker compose -f /opt/zentto-cache/docker-compose.yml up -d

            sudo tee /etc/nginx/sites-available/cache.zentto.net >/dev/null <<'EOF'
            server {
              listen 80;
              server_name cache.zentto.net;

              location / {
                proxy_pass http://127.0.0.1:4101;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto http;
              }
            }

            server {
              listen 443 ssl;
              server_name cache.zentto.net;

              ssl_certificate     /etc/letsencrypt/live/zentto.net/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/zentto.net/privkey.pem;
              ssl_protocols       TLSv1.2 TLSv1.3;
              ssl_prefer_server_ciphers on;

              location / {
                proxy_pass http://127.0.0.1:4101;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
              }
            }
            EOF

            sudo ln -sf /etc/nginx/sites-available/cache.zentto.net /etc/nginx/sites-enabled/cache.zentto.net
            sudo nginx -t
            sudo systemctl reload nginx
